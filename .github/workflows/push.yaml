name: 'Test'
on:
    push:
        branches:
            - main
    pull_request:

env:
    RUST_BACKTRACE: full
    PUBLIC_STRIPE_KEY: ${{ secrets.PUBLIC_STRIPE_KEY }}
    BACKEND_URL: http://localhost:3000
    WEB_URL: http://localhost:5173

permissions:
    id-token: write
    contents: read
    packages: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            docs: ${{ steps.filter.outputs.docs }}
            node: ${{ steps.filter.outputs.node }}
            rust: ${{ steps.filter.outputs.rust }}
            swift: ${{ steps.filter.outputs.swift }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
              id: filter
              with:
                  filters: |
                      workflows: &workflows
                        - '.github/workflows/**'
                        - '.github/actions/**'
                      docs:
                        - '**/*.md'
                      node:
                        - *workflows
                        - 'apps/**'
                        - 'packages/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'
                      common-rust: &rust
                        - *workflows
                        - 'Cargo.lock'
                        - 'Cargo.toml'
                      rust: &any-rust
                        - *rust
                        - 'crates/**'
                      swift:
                        - *workflows
                        - 'apps/macos/**'

    prettier:
        needs: changes
        if: ${{ needs.changes.outputs.node == 'false' &&  needs.changes.outputs.docs == 'true'}}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/init-env-node
            - run: pnpm prettier

    lint-node:
        needs: changes
        if: ${{ needs.changes.outputs.node == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/init-env-node
            - run: pnpm lint

    check-and-test-node:
        needs: changes
        if: ${{ needs.changes.outputs.node == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/init-env-node
            - run: pnpm build
            - run: pnpm check
            - run: pnpm check-types
            - run: pnpm test

    rust-lint:
        needs: changes
        if: ${{ needs.changes.outputs.rust == 'true' }}
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/eurora-labs/ci-base-image:latest
        env:
            CARGO_TERM_COLOR: always
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=--ld-path=wild
            # `scripts/clippy.sh` defaults `CARGO` to `just cargo` so local
            # runs pick up `.env`; CI gets BACKEND_URL/WEB_URL from the
            # workflow-level `env:` block, so plain `cargo` is sufficient
            # and avoids depending on `just` being in the container image.
            CARGO: cargo
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
                  lfs: true
            - name: Rust Cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  shared-key: rust-lint
                  save-if: ${{ github.ref == 'refs/heads/main' }}
            - run: cargo fmt --check --all
            - name: Cargo Clippy
              run: ./scripts/clippy.sh

    swift-lint:
        needs: changes
        if: ${{ needs.changes.outputs.swift == 'true' }}
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - name: Install SwiftLint and SwiftFormat
              run: brew install swiftlint swiftformat
            - name: SwiftLint
              working-directory: apps/macos
              run: swiftlint
            - name: SwiftFormat
              working-directory: apps/macos
              run: swiftformat --lint .

    rust-test:
        needs: changes
        if: ${{ needs.changes.outputs.rust == 'true' }}
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/eurora-labs/ci-base-image:latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: eurora
                options: >-
                    --health-cmd "pg_isready -U postgres -d eurora"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10
        env:
            CARGO_TERM_COLOR: always
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=--ld-path=wild
            DATABASE_URL: postgres://postgres:postgres@postgres:5432/eurora
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
                  lfs: true
            - name: Rust Cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  shared-key: rust-test
                  save-if: ${{ github.ref == 'refs/heads/main' }}
            - run: cargo test --workspace --exclude euro-tauri --exclude be-monolith

    check-rust:
        if: always()
        needs:
            - changes
            - check-rust-windows
            - check-rust-macos
            - rust-test
            - rust-lint
        runs-on: ubuntu-latest
        env:
            CARGO_TERM_COLOR: always
        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
              with:
                  allowed-skips: ${{ toJSON(needs) }}
                  jobs: ${{ toJSON(needs) }}

    check-rust-windows:
        needs: changes
        runs-on: windows-latest
        if: ${{ needs.changes.outputs.rust == 'true' }}
        env:
            CARGO_TERM_COLOR: always
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
                  lfs: true
            - name: Rust Cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  shared-key: windows-rust-testing
            - name: 'cargo check'
              run: cargo check --workspace --all-targets --features windows

    check-rust-macos:
        needs: changes
        runs-on: macos-latest
        if: ${{ needs.changes.outputs.rust == 'true' }}
        env:
            CARGO_TERM_COLOR: always
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
                  lfs: true
            - name: Rust Cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  shared-key: macos-rust-testing
            - name: 'cargo check'
              run: cargo check --workspace --all-targets
