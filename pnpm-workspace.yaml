packages:
    - apps/*
    - packages/*
    - packages/prosemirror/*
    - crates/*
    - backend/*
    - e2e

allowBuilds:
    '@azure/msal-node-extensions': set this to true or false
    '@azure/msal-node-runtime': set this to true or false
    '@ffmpeg-installer/linux-x64': set this to true or false
    '@microsoft/m365agentstoolkit-cli': set this to true or false
    '@sentry/cli': set this to true or false
    core-js: set this to true or false
    edgedriver: set this to true or false
    esbuild: set this to true or false
    geckodriver: set this to true or false
    keytar: set this to true or false
    protobufjs: set this to true or false
    spawn-sync: set this to true or false
    unrs-resolver: set this to true or false

catalog:
    '@lucide/svelte': ^0.577.0
    '@tailwindcss/postcss': ^4.2.4
    '@vitest/ui': 3.2.4
    postcss: ^8.5.12
    tailwindcss: ^4.2.4
    vite: 6.4.2
    vitest: 3.2.4

catalogs:
    redux:
        '@reduxjs/toolkit': ^2.5.0
    svelte:
        '@sveltejs/adapter-static': 3.0.10
        '@sveltejs/kit': 2.58.0
        '@sveltejs/vite-plugin-svelte': 5.1.1
        svelte: 5.55.5
        svelte-check: 4.4.6
onlyBuiltDependencies:
    - esbuild
