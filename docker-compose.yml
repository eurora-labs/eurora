# Local development stack for Eurora.
#
# Brings up Postgres (and an optional one-shot seed container) so you can run
# the backend natively via `just dev:backend` (which is `cargo run -p
# be-monolith`). Running the backend on the host keeps the inner-loop fast
# — no Docker image to rebuild on every code change.
#
# `just dev`         — start Postgres + run backend + start the desktop app
# `just dev:reset`   — wipe the database volume and re-seed the dev user
#
# The seed loader at `scripts/seed/seed.sh` is idempotent (it TRUNCATEs first)
# so it only runs when you opt in via `--profile seed` (driven by the
# justfile recipes).

services:
    postgres:
        image: postgres:16
        restart: unless-stopped
        # The `:?` interpolation form fails compose with a clear error
        # if the variable is unset. There are no in-file defaults: dev
        # values live in `.env` (created from `.env.example` by `just
        # init`), production values come from the deploy environment.
        environment:
            POSTGRES_USER: ${POSTGRES_USER:?required (run `just init` to create .env)}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required (run `just init` to create .env)}
            POSTGRES_DB: ${POSTGRES_DB:?required (run `just init` to create .env)}
        ports:
            - '${EURORA_POSTGRES_PORT:?required (run `just init` to create .env)}:5432'
        volumes:
            - eurora-pgdata:/var/lib/postgresql/data
        healthcheck:
            # `$$` escapes compose's own interpolation so the variable
            # is resolved at run time inside the container, where the
            # postgres image has already populated POSTGRES_USER /
            # POSTGRES_DB from the values above.
            test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
            interval: 5s
            timeout: 3s
            retries: 10

    # Idempotent dev-data seeder. `restart: no` and the explicit profile mean
    # this only runs when you ask for it (`docker compose --profile seed up`).
    seed:
        image: postgres:16
        profiles: ['seed']
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            # Composed from the same POSTGRES_* vars as the postgres
            # service so credentials stay in sync. The host differs
            # from the host-side `REMOTE_DATABASE_URL` in `.env`
            # because the seed container reaches postgres at its
            # compose-network hostname/port (`postgres:5432`), not the
            # host-published port.
            REMOTE_DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
            EURORA_SEED_FORCE: '1'
        volumes:
            - ./scripts/seed:/seed:ro
        entrypoint: ['/bin/bash', '/seed/seed.sh']
        restart: 'no'

volumes:
    eurora-pgdata:
