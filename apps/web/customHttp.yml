customHeaders:
  - pattern: '/.well-known/apple-app-site-association'
    headers:
      - key: 'Content-Type'
        value: 'application/json'
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
  - pattern: '/.well-known/assetlinks.json'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
