[package]
name = "euro-office"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
description = "Asset types and TypeScript bindings for the Eurora Office add-in (Word today; Excel/PowerPoint planned)."

[dependencies]
bon = { workspace = true }
euro-bridge = { workspace = true }
euro-bridge-protocol = { workspace = true }
euro-process = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
specta = { workspace = true, features = ["derive"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

anyhow = { workspace = true, optional = true }
specta-serde = { version = "0.0.12", optional = true }
specta-typescript = { workspace = true, optional = true }

[dev-dependencies]
futures-util = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
tokio-tungstenite = { workspace = true }

[features]
default = []
codegen = ["dep:anyhow", "dep:specta-serde", "dep:specta-typescript"]

[lints]
workspace = true
