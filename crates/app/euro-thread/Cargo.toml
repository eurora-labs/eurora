[package]
name = "euro-thread"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
agent-chain-core = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
dashmap = { workspace = true }
euro-auth = { workspace = true }
euro-endpoint = { workspace = true, features = ["tls-native-roots"] }
euro-transport-policy = { workspace = true }
futures = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
secrecy = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
thread-core = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
tokio-stream = { workspace = true }
tokio-tungstenite = { workspace = true, features = ["native-tls"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true, features = ["serde", "v7"] }

# Optional dependencies for the `tauri` feature, which exposes the
# tauri-specta IPC layer (`commands` module) so both euro-tauri and
# euro-mobile can register the same set of `#[tauri::command]`s.
async-trait = { workspace = true, optional = true }
specta = { workspace = true, optional = true, features = ["derive", "function"] }
tauri = { workspace = true, optional = true }
tauri-specta = { workspace = true, optional = true, features = ["derive"] }

[dev-dependencies]
async-trait = { workspace = true }

[features]
default = []
tauri = [
  "dep:async-trait",
  "dep:specta",
  "dep:tauri",
  "dep:tauri-specta",
  "thread-core/specta",
]
