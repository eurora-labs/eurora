[package]
name = "euro-settings"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
publish = false

[features]
# Forwarded to `euro-endpoint`: every binary consuming `euro-settings`
# must pick a TLS root provider, matching `euro-endpoint`'s own
# feature contract. Desktop (`euro-tauri`) uses `tls-native-roots`;
# mobile (`euro-mobile`) uses `tls-webpki-roots`. The default
# selection lines up with `cargo check -p euro-settings` on desktop
# developer machines.
default = ["tls-native-roots"]
tls-native-roots = ["euro-endpoint/tls-native-roots"]
tls-webpki-roots = ["euro-endpoint/tls-webpki-roots"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
dirs = { workspace = true }
euro-auth = { workspace = true }
euro-endpoint = { workspace = true }
euro-fs = { workspace = true }
euro-secret = { workspace = true }
rand = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }
# Tolerates `//` comments in hand-edited legacy `settings.json` files. The
# wire format the desktop writes is plain JSON via `serde_json`.
serde_json_lenient = { workspace = true }
settings-core = { workspace = true, features = ["specta"] }
specta = { workspace = true, features = ["derive", "function"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time", "test-util"] }
wiremock = { workspace = true }
