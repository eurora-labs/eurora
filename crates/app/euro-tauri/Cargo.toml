[package]
name = "euro-tauri"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
publish = false

[package.metadata.cargo-machete]
ignored = [
  "backtrace",
  "tauri-plugin-dialog",
  "tauri-plugin-fs",
  "tauri-plugin-process",
  "tauri-plugin-store",
]

[lib]
crate-type = ["cdylib", "lib", "staticlib"]
doctest = false

[[bin]]
name = "euro-tauri"
path = "src/main.rs"
test = false

[dependencies]
agent-chain-core = { workspace = true }
auth-core = { workspace = true, features = ["specta"] }
anyhow = { workspace = true }
backon = { workspace = true }
backtrace = { version = "0.3.76", optional = true }
chrono = { workspace = true, features = ["serde"] }
color-thief = "0.2.2"
dirs = { workspace = true }
dotenvy = { workspace = true }
euro-activity = { workspace = true }
euro-auth = { workspace = true }
euro-browser = { workspace = true }
euro-bridge-protocol = { workspace = true }
euro-encrypt = { workspace = true }
euro-endpoint = { workspace = true, features = ["tls-native-roots"] }
euro-process = { workspace = true }
euro-secret = { workspace = true }
euro-settings = { workspace = true }
euro-thread = { workspace = true }
thread-core = { workspace = true, features = ["specta"] }
euro-timeline = { workspace = true }
euro-user = { workspace = true }
euro-vision = { workspace = true }
futures = { workspace = true }
keyring = { workspace = true }
llm-core = { workspace = true, features = ["specta"] }
parking_lot = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
rustls = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true, features = ["arbitrary_precision", "std"] }
specta = { workspace = true, features = ["derive", "function"] }
specta-typescript = { version = "0.0.10" }
tauri = { version = "2.11.1", features = ["tray-icon"] }
tauri-plugin-autostart = "2"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-http = "2"
tauri-plugin-opener = "2"
tauri-plugin-os = "2"
tauri-plugin-process = "2"
tauri-plugin-shell = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-store = "2"
tauri-plugin-tracing = { version = "0.3.2", features = ["colored"] }
tauri-plugin-updater = "2.10"
tauri-plugin-window-state = "2"
sentry = { workspace = true, default-features = false, features = [
  "backtrace",
  "contexts",
  "debug-images",
  "panic",
  "reqwest",
  "rustls",
  "tracing",
  "release-health",
] }
# taurpc = { git = "https://github.com/AndreRoelofs/TauRPC.git", branch = "chore/specta-bump" }
taurpc = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["parking_lot", "rt-multi-thread"] }
tokio-util = "0.7"
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10.1"

[target.'cfg(target_os = "windows")'.dependencies]
winreg = "0.56"
windows = { version = "0.61", features = ["Win32_Foundation", "Win32_Graphics_Dwm"] }


[features]
default = ["custom-protocol", "devtools"]
# this feature is used used for production builds where `devPath` points to the filesystem
# DO NOT remove this
custom-protocol = ["tauri/custom-protocol"]
devtools = ["tauri/devtools"]
error-context = ["dep:backtrace"]
## A forwarding to all crates that have windows-specific adjustments for testing on non-Windows.
windows = []

[lints.clippy]
all = "deny"
correctness = "deny"
perf = "deny"
