[package]
name = "euro-bridge"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
description = "Local IPC bridge between the Eurora desktop app and external clients (browser extensions, Office.js add-ins)."

[dependencies]
axum = { workspace = true, features = ["ws"] }
dashmap = "6.1.0"
euro-bridge-protocol = { workspace = true }
futures-util = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
  "fs",
  "macros",
  "rt-multi-thread",
  "net",
] }
tokio-stream = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "net"] }
tokio-tungstenite = "0.27"

[lints.clippy]
all = "deny"
correctness = "deny"
perf = "deny"
