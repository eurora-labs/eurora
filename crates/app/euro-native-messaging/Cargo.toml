[package]
name = "euro-native-messaging"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
anyhow = { workspace = true }
backon = { workspace = true }
base64 = { workspace = true }
enum_dispatch = { workspace = true }
euro-bridge-protocol = { workspace = true }
euro-process = { workspace = true }
futures-util = { workspace = true }
image = { workspace = true, features = ["default"] }
resvg = { version = "0.47" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
specta = { workspace = true, features = [
  "derive",
  "collect",
  "function",
  "serde_json",
] }
specta-typescript = { version = "0.0.10" }
strum_macros = { workspace = true }
tiny-skia = "0.12"
tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = "0.27"
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
usvg = { version = "0.47", default-features = true }

[dev-dependencies]
euro-bridge = { workspace = true }

[target.'cfg(windows)'.dependencies]
winreg = "0.56"

[lints.clippy]
all = "deny"
correctness = "deny"
perf = "deny"
