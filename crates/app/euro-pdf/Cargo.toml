[package]
name = "euro-pdf"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
description = "Desktop runtime layer over `pdf-core`: filesystem-aware parsing, MIME classification, and the `PdfAsset` value type consumed by `euro-activity`."

[dependencies]
bon = { workspace = true }
pdf-core = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = [
  "fs",
  "macros",
  "rt-multi-thread",
  "sync",
] }

[lints.clippy]
all = "deny"
correctness = "deny"
perf = "deny"
