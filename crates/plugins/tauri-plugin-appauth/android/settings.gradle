// Plugin management resolves the Android Gradle Plugin and Kotlin plugin when
// the library is built standalone (e.g. `gradle assembleDebug` from this
// directory). When the library is embedded in a Tauri host app, the host
// app's `settings.gradle` provides its own resolution and these blocks are
// effectively ignored — they don't conflict.
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    plugins {
        id 'com.android.library' version '8.7.3'
        id 'org.jetbrains.kotlin.android' version '2.1.0'
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

include ':tauri-android'
project(':tauri-android').projectDir = new File('./.tauri/tauri-api')
