[package]
name = "be-activity-service"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
activity-core = { workspace = true }
axum = { workspace = true, features = ["macros"] }
base64 = { workspace = true }
be-analytics = { workspace = true }
be-asset = { workspace = true }
be-auth-core = { workspace = true }
be-remote-db = { workspace = true }
be-storage = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v7"] }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
tower = { workspace = true, features = ["util"] }
