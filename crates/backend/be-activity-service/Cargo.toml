[package]
name = "be-activity-service"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
activity-core = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true, features = ["macros"] }
base64 = { workspace = true }
be-asset = { workspace = true }
be-auth-core = { workspace = true }
be-authz = { workspace = true }
be-remote-db = { workspace = true }
be-storage = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
posthog-rs = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
tower = { workspace = true }
tower-http = { version = "0.6.8", features = ["trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v7"] }

[dev-dependencies]
jsonwebtoken = { workspace = true }
