[package]
name = "be-payment-service"
version = "0.0.0"
edition.workspace = true
description = "Eurora Payment Service"
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
publish = false

[package.metadata.cargo-machete]
ignored = [
  "async-stripe",
  "async-stripe-core",
  "async-stripe-shared",
  "async-stripe-webhook",
  "async-stripe-billing",
  "async-stripe-checkout"
]

[dependencies]
anyhow = { workspace = true }
async-stripe = { version = "1.0.0-rc.5", default-features = false, features = [
  "rustls-aws-lc-rs",
  "rustls-tls-webpki-roots",
  "uuid"
] }
async-stripe-billing = { version = "1.0.0-rc.5", features = [
  "billing_portal_session",
  "subscription"
] }
async-stripe-checkout = { version = "1.0.0-rc.5", features = [
  "checkout_session"
] }
async-stripe-core = { version = "1.0.0-rc.5", features = [
  "customer",
  "payment_intent"
] }
async-stripe-shared = { version = "1.0.0-rc.5", features = ["serialize"] }
async-stripe-webhook = { version = "1.0.0-rc.5", features = [
  "async-stripe-billing",
  "async-stripe-checkout"
] }
axum = { workspace = true, features = ["macros"] }
be-auth-core = { workspace = true }
be-remote-db = { workspace = true }
chrono = { workspace = true }
posthog-rs = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "time"] }
tower = { workspace = true }
tower_governor = "0.8"
tower-http = { version = "0.6.8", features = ["cors", "trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
jsonwebtoken = { workspace = true }
