[package]
name = "be-thread-service"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
agent-chain = { workspace = true, features = ["openai"] }
agent-chain-core = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true, features = ["macros", "ws"] }
base64 = { workspace = true }
be-asset = { workspace = true }
be-auth-core = { workspace = true }
be-authz = { workspace = true }
be-remote-db = { workspace = true }
be-storage = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
dashmap = { workspace = true }
eurora-tools = { workspace = true }
futures = { workspace = true }
llm-core = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
secrecy = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
thread-core = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v7"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "test-util", "time"] }
