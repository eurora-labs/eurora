[package]
name = "be-asset-service"
version = "0.0.0"
edition.workspace = true
description = "Eurora Asset Service - HTTP service for managing user file assets"
license.workspace = true

[dependencies]
asset-core = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
be-asset = { workspace = true }
be-auth-core = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }

[dev-dependencies]
be-remote-db = { workspace = true }
be-storage = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
sqlx = { version = "0.8.6", features = [
  "chrono",
  "json",
  "macros",
  "migrate",
  "postgres",
  "runtime-tokio",
  "tls-rustls-aws-lc-rs",
  "uuid",
] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
