[package]
name = "be-asset-service"
version = "0.0.0"
edition.workspace = true
description = "Eurora Asset Service - HTTP service for managing user file assets"
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
asset-core = { workspace = true }
auth-core = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
be-asset = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tower-http = { version = "0.6.8", features = ["trace"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }
