[package]
name = "be-asset"
version = "0.0.0"
edition.workspace = true
description = "Asset Service - Logic for managing file assets"
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
asset-core = { workspace = true }
base64 = { workspace = true }
be-remote-db = { workspace = true }
be-storage = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
hex = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4", "v7"] }

[dev-dependencies]
sqlx = { version = "0.8.6", features = [
  "chrono",
  "json",
  "macros",
  "migrate",
  "postgres",
  "runtime-tokio",
  "tls-rustls-aws-lc-rs",
  "uuid",
] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
