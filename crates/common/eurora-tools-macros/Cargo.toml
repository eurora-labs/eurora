[package]
name = "eurora-tools-macros"
version = "0.0.0"
edition.workspace = true
description = "Procedural macros for `eurora-tools`. Provides `#[adapter]` / `#[tool]` to emit descriptor tables, `Dispatcher` impls, and the `trait_variant::make` Send-bound wrapper for adapter traits."
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["extra-traits", "full", "parsing"] }

[dev-dependencies]
eurora-tools = { workspace = true }
insta = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
tokio-util = { workspace = true, features = ["rt"] }
trybuild = { workspace = true }

[lints]
workspace = true
