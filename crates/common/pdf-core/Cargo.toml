[package]
name = "pdf-core"
version = "0.0.0"
edition.workspace = true
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"
description = "OS-agnostic PDF inspection and Markdown conversion. Wraps firecrawl/pdf-inspector with serializable result types so both desktop and backend crates can share the same parser."

[dependencies]
pdf-inspector = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true
