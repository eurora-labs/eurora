[package]
name = "activity-core"
version = "0.0.0"
edition.workspace = true
description = "Shared HTTP wire types for the Eurora activity service. Consumed by both the backend (be-activity-service) and the desktop app (euro-activity), and exported as TypeScript bindings via the workspace-level `euro-codegen` orchestrator."
license.workspace = true

[dependencies]
chrono = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
uuid = { workspace = true, features = ["serde"] }

specta = { workspace = true, optional = true, features = [
  "derive",
  "chrono",
  "uuid",
] }

[dev-dependencies]
serde_json = { workspace = true }

[features]
default = []
specta = ["dep:specta"]
