[package]
name = "activity-core"
version = "0.0.0"
edition.workspace = true
description = "Shared HTTP wire types for the Eurora activity service. Consumed by both the backend (be-activity-service) and the desktop app (euro-activity), and exported as TypeScript bindings via specta."
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
chrono = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
uuid = { workspace = true, features = ["serde"] }

specta = { workspace = true, optional = true, features = [
  "derive",
  "chrono",
  "uuid",
] }

anyhow = { workspace = true, optional = true }
specta-typescript = { version = "0.0.10", optional = true }

[dev-dependencies]
serde_json = { workspace = true }

[features]
default = []
specta = ["dep:specta"]
codegen = ["specta", "dep:anyhow", "dep:specta-typescript"]

[[bin]]
name = "activity-core-codegen"
path = "src/bin/codegen.rs"
required-features = ["codegen"]
