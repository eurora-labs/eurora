[package]
name = "auth-core"
version = "0.0.0"
edition.workspace = true
description = "Shared HTTP wire types for the Eurora auth service. Consumed by both the backend (be-auth-service) and the desktop/mobile apps (euro-auth), and exported as TypeScript bindings via specta."
license = "LicenseRef-Eurora-SUL-AND-Apache-2.0"

[dependencies]
serde = { workspace = true, features = ["derive", "std"] }

specta = { workspace = true, optional = true, features = [
  "derive",
  "function",
] }

anyhow = { workspace = true, optional = true }
specta-typescript = { version = "0.0.10", optional = true }

[dev-dependencies]
serde_json = { workspace = true }

[features]
default = []
specta = ["dep:specta"]
codegen = ["specta", "dep:anyhow", "dep:specta-typescript"]

[[bin]]
name = "auth-core-codegen"
path = "src/bin/codegen.rs"
required-features = ["codegen"]
