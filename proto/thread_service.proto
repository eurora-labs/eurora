syntax = "proto3";

package thread_service;

import "agent_chain.proto";
import "google/protobuf/timestamp.proto";

service ProtoThreadService {
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);

  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc ChatStream(ChatStreamRequest) returns (stream agent_chain.ChatStreamResponse);
  rpc GenerateThreadTitle(GenerateThreadTitleRequest) returns (GenerateThreadTitleResponse);
  rpc SwitchBranch(SwitchBranchRequest) returns (GetMessagesResponse);
  rpc SearchThreads(SearchThreadsRequest) returns (SearchThreadsResponse);
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  rpc SavePreliminaryContentBlocks(SavePreliminaryContentBlocksRequest) returns (SavePreliminaryContentBlocksResponse);
}

message CreateThreadRequest {
  string title = 1;
}

message ProtoThread {
  string id = 1;
  string user_id = 2;
  string title = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  optional string active_leaf_id = 6;
}

message CreateThreadResponse {
  ProtoThread thread = 1;
}

message ListThreadsRequest {
  uint32 limit = 1;
  uint32 offset = 2;
}

message ListThreadsResponse {
  repeated ProtoThread threads = 1;
}

message ChatStreamRequest {
  string thread_id = 1;
  repeated agent_chain.ProtoContentBlock content_blocks = 2;
  optional string parent_message_id = 3;
  optional string asset_chips_json = 4;
}

message GetMessagesRequest {
  string thread_id = 1;
  uint32 limit = 2;
  uint32 offset = 3;
  bool all_variants = 4;
}

// message MessageSiblingInfo {
//   string message_id = 1;
//   uint32 sibling_count = 2;
//   uint32 sibling_index = 3;
// }

message GetMessagesResponse {
  repeated agent_chain.BaseMessageWithSibling messages = 1;
  // repeated MessageSiblingInfo sibling_info = 2;
}

message SwitchBranchRequest {
  string thread_id = 1;
  string message_id = 2;
  int32 direction = 3;
}

message GetThreadRequest {
  string thread_id = 1;
}

message GetThreadResponse {
  ProtoThread thread = 1;
}

message DeleteThreadRequest {
  string thread_id = 1;
}

message DeleteThreadResponse {}

message GenerateThreadTitleRequest {
  string thread_id = 1;
  string content = 2;
}

message GenerateThreadTitleResponse {
  ProtoThread thread = 1;
}

message SearchThreadsRequest {
  string query = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message SearchThreadsResponse {
  repeated SearchThreadResult results = 1;
}

message SearchThreadResult {
  string id = 1;
  string title = 2;
  float rank = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message SearchMessagesRequest {
  string query = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message SearchMessagesResponse {
  repeated SearchMessageResult results = 1;
}

message SearchMessageResult {
  string id = 1;
  string thread_id = 2;
  string message_type = 3;
  string content = 4;
  float rank = 5;
  google.protobuf.Timestamp created_at = 6;
  string snippet = 7;
}

message SavePreliminaryContentBlocksRequest {
  string thread_id = 1;
  repeated agent_chain.ProtoContentBlock content_blocks = 2;
}

message SavePreliminaryContentBlocksResponse {
  repeated agent_chain.ProtoContentBlock content_blocks = 1;
}
