syntax = "proto3";

package thread_service;

import "agent_chain.proto";
import "google/protobuf/timestamp.proto";

service ProtoThreadService {
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);

  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc AddHiddenHumanMessage(AddHiddenHumanMessageRequest) returns (AddHiddenHumanMessageResponse);
  rpc AddHumanMessage(AddHumanMessageRequest) returns (AddHumanMessageResponse);
  rpc AddSystemMessage(AddSystemMessageRequest) returns (AddSystemMessageResponse);

  rpc ChatStream(ChatStreamRequest) returns (stream agent_chain.ProtoAIMessageChunk);
  rpc GenerateThreadTitle(GenerateThreadTitleRequest) returns (GenerateThreadTitleResponse);
  rpc SwitchBranch(SwitchBranchRequest) returns (GetMessagesResponse);
  rpc GetMessageTree(GetMessageTreeRequest) returns (GetMessageTreeResponse);

  rpc SearchThreads(SearchThreadsRequest) returns (SearchThreadsResponse);
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
}

message CreateThreadRequest {
  string title = 1;
}

message Thread {
  string id = 1;
  string user_id = 2;
  string title = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  optional string active_leaf_id = 6;
}

message CreateThreadResponse {
  Thread thread = 1;
}

message ListThreadsRequest {
  uint32 limit = 1;
  uint32 offset = 2;
}

message ListThreadsResponse {
  repeated Thread threads = 1;
}

message ChatStreamRequest {
  string thread_id = 1;
  string content = 2;
  optional string parent_message_id = 3;
  optional string asset_chips_json = 4;
  optional string image_asset_ids_json = 5;
}

message AddHumanMessageRequest {
  string thread_id = 1;
  agent_chain.ProtoHumanMessage message = 2;
}

message AddHumanMessageResponse {
  agent_chain.ProtoBaseMessage message = 1;
}

message AddHiddenHumanMessageRequest {
  string thread_id = 1;
  agent_chain.ProtoHumanMessage message = 2;
}

message AddHiddenHumanMessageResponse {
  agent_chain.ProtoBaseMessage message = 1;
}

message GetMessagesRequest {
  string thread_id = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message MessageSiblingInfo {
  string message_id = 1;
  uint32 sibling_count = 2;
  uint32 sibling_index = 3;
}

message GetMessagesResponse {
  repeated agent_chain.ProtoBaseMessage messages = 1;
  repeated MessageSiblingInfo sibling_info = 2;
}

message SwitchBranchRequest {
  string thread_id = 1;
  string message_id = 2;
  int32 direction = 3;
}

message GetThreadRequest {
  string thread_id = 1;
}

message GetThreadResponse {
  Thread thread = 1;
}

message DeleteThreadRequest {
  string thread_id = 1;
}

message DeleteThreadResponse {}

message AddSystemMessageRequest {
  string thread_id = 1;
  agent_chain.ProtoSystemMessage message = 2;
}

message AddSystemMessageResponse {
  agent_chain.ProtoBaseMessage message = 1;
}

message GenerateThreadTitleRequest {
  string thread_id = 1;
  string content = 2;
}

message GenerateThreadTitleResponse {
  Thread thread = 1;
}

message GetMessageTreeRequest {
  string thread_id = 1;
  uint32 start_level = 2;
  uint32 end_level = 3;
  repeated string parent_node_ids = 4;
}

message MessageTreeNode {
  string id = 1;
  optional string parent_message_id = 2;
  string message_type = 3;
  string content = 4;
  uint32 level = 5;
  uint32 sibling_count = 6;
  uint32 sibling_index = 7;
  optional string additional_kwargs = 8;
  optional string reasoning_blocks = 9;
}

message GetMessageTreeResponse {
  repeated MessageTreeNode nodes = 1;
  bool has_more = 2;
}

message SearchThreadsRequest {
  string query = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message SearchThreadsResponse {
  repeated SearchThreadResult results = 1;
}

message SearchThreadResult {
  string id = 1;
  string title = 2;
  float rank = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message SearchMessagesRequest {
  string query = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message SearchMessagesResponse {
  repeated SearchMessageResult results = 1;
}

message SearchMessageResult {
  string id = 1;
  string thread_id = 2;
  string message_type = 3;
  string content = 4;
  float rank = 5;
  google.protobuf.Timestamp created_at = 6;
  string snippet = 7;
}
