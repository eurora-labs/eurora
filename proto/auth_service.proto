syntax = "proto3";
package auth_service;

import "google/protobuf/empty.proto";

service ProtoAuthService {
  rpc Login(LoginRequest) returns (TokenResponse);
  rpc Register(RegisterRequest) returns (TokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenResponse);
  rpc GetThirdPartyAuthUrl(ThirdPartyAuthUrlRequest) returns (ThirdPartyAuthUrlResponse);
  rpc LoginByLoginToken(LoginByLoginTokenRequest) returns (TokenResponse);
  rpc AssociateLoginToken(AssociateLoginTokenRequest) returns (google.protobuf.Empty);
  rpc CheckEmail(CheckEmailRequest) returns (CheckEmailResponse);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  rpc VerifyEmail(VerifyEmailRequest) returns (TokenResponse);
  rpc ResendVerificationEmail(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message LoginRequest {
  oneof credential {
    EmailPasswordCredentials email_password = 1;
    ThirdPartyCredentials third_party = 2;
  }
}

message EmailPasswordCredentials {
  string login = 1;
  string password = 2;
}

message ThirdPartyCredentials {
  Provider provider = 1;
  string code = 2;
  string state = 3;
  optional string login_token = 4;
  optional string challenge_method = 5;
}

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  GOOGLE = 1;
  GITHUB = 2;
}
message RegisterRequest {
  string email = 1;
  string password = 2;
  optional string display_name = 3;
}

message RefreshTokenRequest {}

message ThirdPartyAuthUrlRequest {
  Provider provider = 1;
}

message ThirdPartyAuthUrlResponse {
  string url = 1;
}

message TokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message LoginByLoginTokenRequest {
  string token = 1;
}

message AssociateLoginTokenRequest {
  string code_challenge = 1;
}

message CheckEmailRequest {
  string email = 1;
}

message CheckEmailResponse {
  string status = 1;
  optional Provider provider = 2;
}

message LogoutRequest {}

message VerifyEmailRequest {
  string token = 1;
}
